    };

    const formatTag = (tag) => {
      return getTagEmoji(tag) + tag.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
    };

    const getPersonalizedInsights = (actId, userInterests) => {
      const insightsForAct = PERSONALIZED_INSIGHTS[actId];
      if (!insightsForAct || !userInterests || userInterests.length === 0) return null;
      let bestInsight = null;
      for (const interest of userInterests) {
        if (insightsForAct[interest]) { bestInsight = insightsForAct[interest]; break; }
        const partialMatchKey = Object.keys(insightsForAct).find(k => interest.includes(k) || k.includes(interest));
        if (partialMatchKey) { bestInsight = insightsForAct[partialMatchKey]; break; }
      }
      return bestInsight;
    };

    function App() {
      const [participants, setParticipants] = useState([]);
      const [authUser, setAuthUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentAnswers, setCurrentAnswers] = useState({});
      const [surveyStep, setSurveyStep] = useState(0); 
      const [tempProfile, setTempProfile] = useState({ name: '', diet: '', needs: '' });
      const [loginName, setLoginName] = useState('');
      const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', user: null });
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [adminError, setAdminError] = useState('');
      const [profileError, setProfileError] = useState('');
      const [isDemoMode, setIsDemoMode] = useState(!isFirebaseActive);
      
      const [activeTab, setActiveTab] = useState('jadwal');
      const [selectedDay, setSelectedDay] = useState(null);
      const [now, setNow] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 60000); 
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (!isFirebaseActive) return;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (error) { console.error("Auth Error:", error); setIsDemoMode(true); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setAuthUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!isFirebaseActive || !authUser) return;
        const participantsRef = collection(db, 'trip_planner_data');
        const unsubscribe = onSnapshot(participantsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setParticipants(data);
          if (currentUser && currentUser.role !== 'admin') {
            const updatedUser = data.find(u => u.id === currentUser.id);
            if (updatedUser) setCurrentUser(updatedUser);
          }
        }, (error) => console.error("Snapshot error:", error));
        return () => unsubscribe();
      }, [authUser, currentUser?.id]);

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        const trimmedName = loginName.trim();
        if (!trimmedName) return;
        let user = participants.find(u => u.name.toLowerCase() === trimmedName.toLowerCase() || u.realName?.toLowerCase() === trimmedName.toLowerCase());
        
        if (!user) {
          const newId = 'u_' + Date.now();
          user = { id: newId, name: trimmedName, realName: trimmedName, role: 'user', hasCompletedSurvey: false, interests: [], diet: '', needs: '', checkedTasks: [] };
          if (isFirebaseActive && authUser) {
            const docRef = doc(db, 'trip_planner_data', newId);
            await setDoc(docRef, user);
          } else {
            setParticipants(prev => [...prev, user]);
          }
        } else {
          if(!user.checkedTasks) user.checkedTasks = [];
        }

        setCurrentUser(user);
        setSurveyStep(0);
        setCurrentAnswers({});
        setTempProfile({ name: user.realName || '', diet: user.diet || '', needs: user.needs || '' });
        setActiveTab('jadwal');
        setSelectedDay(null);
      };

      const handleAdminSubmit = () => {
        if (adminPassword === "admin123") {
          setCurrentUser({ id: 'admin', name: 'Alhamdi', role: 'admin' });
          setSurveyStep(0);
          setShowAdminModal(false);
          setAdminPassword('');
          setAdminError('');
        } else {
          setAdminError("Password salah.");
        }
      };

      const handleLogout = () => { setCurrentUser(null); setLoginName(''); };

      const handleProfileSubmit = async (e) => {
        e.preventDefault();
        if (!tempProfile.name.trim()) { setProfileError('Isi nama Kamu.'); return; }
        setProfileError('');
        const updatedUser = { ...currentUser, realName: tempProfile.name, diet: tempProfile.diet || 'Tidak ada', needs: tempProfile.needs || 'Tidak ada' };
        setCurrentUser(updatedUser);
        setSurveyStep(1); 
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await setDoc(docRef, updatedUser, { merge: true });
        } else {
          setParticipants(prev => prev.map(u => u.id === currentUser.id ? updatedUser : u));
        }
      };

      const handleAnswer = (questionId, tags) => {
        setCurrentAnswers(prev => ({ ...prev, [questionId]: tags }));
        if (surveyStep < QUESTIONS.length) { setSurveyStep(prev => prev + 1); } 
        else { finishSurvey(tags, questionId); }
      };

      const finishSurvey = async (lastTags, lastQuestionId) => {
        const allAnswers = { ...currentAnswers, [lastQuestionId]: lastTags };
        let calculatedTags = [];
        Object.values(allAnswers).forEach(tags => calculatedTags = [...calculatedTags, ...tags]);
        const uniqueTags = [...new Set(calculatedTags)];
        const finalUserData = { ...currentUser, hasCompletedSurvey: true, interests: uniqueTags };
        setCurrentUser(finalUserData);
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await setDoc(docRef, finalUserData, { merge: true });
        } else {
          setParticipants(prev => prev.map(u => u.id === currentUser.id ? finalUserData : u));
        }
      };

      const toggleTask = async (taskId) => {
        if (currentUser.role === 'admin') return;
        const currentTasks = currentUser.checkedTasks || [];
        const isChecked = currentTasks.includes(taskId);
        let newTasks = isChecked ? currentTasks.filter(id => id !== taskId) : [...currentTasks, taskId];
        const updatedUser = { ...currentUser, checkedTasks: newTasks };
        setCurrentUser(updatedUser);
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await updateDoc(docRef, { checkedTasks: newTasks });
        } else {
           setParticipants(prev => prev.map(u => u.id === currentUser.id ? updatedUser : u));
        }
      };

      const isRecommended = (activityTags, userInterests) => {
        if (!userInterests || userInterests.length === 0) return false;
        if (userInterests.includes('semua')) return true;
        return activityTags.some(tag => userInterests.includes(tag));
      };

      const executeAction = async () => {
        if (!modalConfig.user) return;
        if (modalConfig.type === 'delete') {
          if (isFirebaseActive && authUser) {
            const userRef = doc(db, 'trip_planner_data', modalConfig.user.id);
            await deleteDoc(userRef);
          } else { setParticipants(prev => prev.filter(u => u.id !== modalConfig.user.id)); }
        } else if (modalConfig.type === 'reset') {
           const resetData = { hasCompletedSurvey: false, interests: [], diet: '', needs: '', checkedTasks: [] };
           if (isFirebaseActive && authUser) {
              const userRef = doc(db, 'trip_planner_data', modalConfig.user.id);
              await updateDoc(userRef, resetData);
           } else { setParticipants(prev => prev.map(u => u.id === modalConfig.user.id ? {...u, ...resetData} : u)); }
        }
        setModalConfig({ isOpen: false, type: '', user: null });
      };

      const ActivityCard = ({ act, match }) => {
        const userTasks = currentUser?.checkedTasks || [];
        const allChecked = act.todo && act.todo.length > 0 && act.todo.every((_, idx) => userTasks.includes(`${act.id}_t${idx}`));
        const personalizedInsight = getPersonalizedInsights(act.id, currentUser?.interests);
        const souvenirs = SOUVENIR_RECOMMENDATIONS[act.id];

        return (
          <div className="relative pl-5 pb-6" id={`act-${act.id}`}>
            <div className="absolute left-[9px] top-6 bottom-0 w-0.5 bg-blue-200"></div>
            <div className={`absolute left-0 top-1.5 w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm z-10 ${allChecked ? 'bg-green-500' : 'bg-blue-600'}`}>
               {allChecked ? <CheckCircle className="w-2.5 h-2.5 text-white" /> : <Clock className="w-2.5 h-2.5 text-white" />}
            </div>

            <div className={`rounded-2xl overflow-hidden shadow-md transition-all duration-300 bg-white border ${match ? 'border-blue-400 ring-1 ring-blue-100' : 'border-gray-100'}`}>
              <div className="relative h-32 md:h-48 w-full group overflow-hidden">
                <img src={act.thumbnail} alt={act.desc} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-4">
                  <div className="flex justify-between items-end">
                    <div>
                      <span className="text-blue-300 font-bold text-xs mb-1 block">{act.time}</span>
                      <h3 className="text-white text-base md:text-lg font-bold leading-tight">{act.desc}</h3>
                    </div>
                  </div>
                </div>
              </div>

              <div className="p-4">
                {match && <div className="mb-3"><span className="inline-block bg-blue-600 text-white text-[10px] px-2 py-1 rounded font-bold shadow-sm">Rekomendasi Untukmu</span></div>}
                
                <div className="flex flex-wrap gap-2 mb-4">
                  {act.tags.map((tag, tIdx) => (<span key={tIdx} className="text-[10px] md:text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-md font-bold border border-gray-200">{formatTag(tag)}</span>))}
                </div>

                {(personalizedInsight || act.insight) && (
                  <div className="mb-4 bg-blue-50 p-3 rounded-xl border border-blue-100 text-xs md:text-sm text-blue-900 shadow-sm">
                    <Compass className="w-4 h-4 inline-block mr-1 mb-0.5 text-blue-600" />
                    <span className="font-bold">Info Spesial:</span> {personalizedInsight || act.insight}
                  </div>
                )}

                {souvenirs && (
                  <div className="mb-4 bg-pink-50 p-3 rounded-xl border border-pink-100 text-xs md:text-sm text-pink-900 shadow-sm">
                    <div className="flex items-center mb-2">
                      <ShoppingBag className="w-4 h-4 mr-2 text-pink-600" />
                      <span className="font-bold">Rekomendasi Oleh-oleh:</span>
                    </div>
                    <ul className="list-disc pl-6 space-y-1">
                      {souvenirs.map((item, idx) => (
                        <li key={idx} className="font-medium text-pink-800">{item}</li>
                      ))}
                    </ul>
                  </div>
                )}

                {act.location && (
                  <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.location)}`} target="_blank" rel="noopener noreferrer" className="mb-4 flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-200 text-xs font-bold text-gray-700 active:bg-gray-200 transition-colors">
                    <span className="flex items-center gap-2"><MapPin className="w-4 h-4 text-red-500" /> Buka Peta {act.location.split(',')[0]}</span>
                    <ExternalLink className="w-4 h-4 text-gray-400" />
                  </a>
                )}

                {act.info && (
                  <div className="flex mb-4 bg-yellow-50 p-3 rounded-xl border border-yellow-100 text-xs md:text-sm text-yellow-800">
                    <Info className="w-4 h-4 mr-2 flex-shrink-0 text-yellow-600" /><p>{act.info}</p>
                  </div>
                )}

                {act.todo && act.todo.length > 0 && (
                  <div className="space-y-2 mt-2">
                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Daftar Kegiatan:</p>
                    {act.todo.map((task, idx) => {
                      const taskId = `${act.id}_t${idx}`;
                      const isChecked = userTasks.includes(taskId);
                      const canEdit = currentUser.role === 'user';
                      
                      return (
                        <label key={idx} className={`flex items-start gap-3 p-2 rounded-lg transition-colors cursor-pointer ${isChecked ? 'bg-green-50' : 'active:bg-gray-50'}`}>
                          <input type="checkbox" checked={isChecked} onChange={() => toggleTask(taskId)} disabled={!canEdit} className="mt-0.5 w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                          <span className={`text-xs leading-tight mt-1 ${isChecked ? 'line-through text-gray-400' : 'text-gray-700 font-bold'}`}>{task}</span>
                        </label>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const LiveTripStatus = () => {
        let currentAct = null;
        let nextAct = null;
        let status = 'PRE-TRIP';

        if (now < FLAT_SCHEDULE[0].datetime) {
          status = 'PRE-TRIP';
          nextAct = FLAT_SCHEDULE[0];
        } else if (now > FLAT_SCHEDULE[FLAT_SCHEDULE.length - 1].datetime) {
          status = 'POST-TRIP';
        } else {
          status = 'ON-TRIP';
          for (let i = 0; i < FLAT_SCHEDULE.length; i++) {
            if (now >= FLAT_SCHEDULE[i].datetime && (!FLAT_SCHEDULE[i+1] || now < FLAT_SCHEDULE[i+1].datetime)) {
              currentAct = FLAT_SCHEDULE[i];
              nextAct = FLAT_SCHEDULE[i+1] || null;
              break;
            }
          }
        }

        if (status === 'PRE-TRIP') {
          return (
            <div className="bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl p-4 mb-6 text-white shadow-md border border-blue-500 relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-20"><Calendar className="w-16 h-16"/></div>
              <h3 className="font-extrabold text-sm mb-1 flex items-center"><Navigation className="w-4 h-4 mr-2" /> Persiapan Keberangkatan</h3>
              <p className="text-xs text-blue-100 font-medium">Perjalanan dimulai 30 April 2026. Persiapkan fisik dan dokumen Kamu.</p>
            </div>
          );
        }

        if (status === 'POST-TRIP') {
          return (
             <div className="bg-gradient-to-r from-green-600 to-green-700 rounded-2xl p-4 mb-6 text-white shadow-md border border-green-500">
              <h3 className="font-extrabold text-sm mb-1 flex items-center"><CheckCircle className="w-4 h-4 mr-2" /> Misi Selesai</h3>
              <p className="text-xs text-green-100 font-medium">Seluruh rangkaian tur Malaysia diselesaikan dengan baik.</p>
            </div>
          );
        }

        return (
          <div className="bg-white rounded-2xl p-4 mb-6 shadow-md border border-blue-100 relative overflow-hidden">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center text-blue-600">
                <div className="w-2.5 h-2.5 bg-blue-600 rounded-full mr-2 live-indicator"></div>
                <span className="text-xs font-extrabold uppercase tracking-widest">Pelacak Waktu</span>
              </div>
              <span className="text-[10px] font-bold text-gray-400">{now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
            
            {currentAct && (
              <div className="mb-3 border-l-2 border-blue-500 pl-3">
                <p className="text-[10px] font-bold text-gray-400 uppercase">Saat Ini</p>
                <p className="text-sm font-extrabold text-gray-900 leading-tight">{currentAct.desc}</p>
                <p className="text-xs text-blue-600 font-bold flex items-center mt-1"><MapPin className="w-3 h-3 mr-1"/> {currentAct.location}</p>
              </div>
            )}
            
            {nextAct && (
              <div className="bg-gray-50 p-3 rounded-xl border border-gray-100 flex items-start">
                <ArrowRight className="w-4 h-4 text-gray-400 mr-2 mt-0.5 flex-shrink-0" />
                <div>
                  <p className="text-[10px] font-bold text-gray-400 uppercase">Berikutnya • {nextAct.time}</p>
                  <p className="text-xs font-bold text-gray-700">{nextAct.desc}</p>
                </div>
              </div>
            )}
          </div>
        );
      };

      const FilterHari = () => (
        <div className="flex gap-2 overflow-x-auto hide-scrollbar py-2 mb-4 sticky top-0 bg-gray-50 z-30 border-b border-gray-200 px-4 -mx-4 shadow-sm">
          <button onClick={() => setSelectedDay(null)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${selectedDay === null ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 border-gray-200 active:bg-gray-100'}`}>Semua</button>
          {[1, 2, 3, 4, 5].map(day => (
            <button key={day} onClick={() => setSelectedDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${selectedDay === day ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 border-gray-200 active:bg-gray-100'}`}>Hari {day}</button>
          ))}
        </div>
      );

      const BottomNav = () => {
        if (currentUser.role === 'admin') return null; 
        return (
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 pb-safe z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onClick={() => setActiveTab('jadwal')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'jadwal' ? 'text-blue-600' : 'text-gray-400'}`}><Calendar className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Jadwal</span></button>
            <button onClick={() => setActiveTab('peta')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'peta' ? 'text-blue-600' : 'text-gray-400'}`}><MapIcon className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Peta</span></button>
            <button onClick={() => setActiveTab('profil')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'profil' ? 'text-blue-600' : 'text-gray-400'}`}><User className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Profil</span></button>
            <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'info' ? 'text-blue-600' : 'text-gray-400'}`}><Info className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Info</span></button>
          </div>
        );
      };

      // --- LOGIN SCREEN ---
      if (!currentUser) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gray-900 relative">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Petronas_Towers_and_KLCC_Park_at_dusk_%282023%29.jpg/800px-Petronas_Towers_and_KLCC_Park_at_dusk_%282023%29.jpg" className="absolute inset-0 w-full h-full object-cover opacity-40" />
            <div className="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10">
              {isDemoMode && <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md whitespace-nowrap">Mode Uji Coba Offline</div>}
              <div className="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><MapPin className="text-white w-7 h-7" /></div>
              <h1 className="text-2xl font-extrabold text-gray-900 mb-1">Trip Planner</h1>
              <p className="text-blue-600 font-bold text-xs uppercase tracking-widest mb-6">Edisi Malaysia</p>
              <form onSubmit={handleLoginSubmit} className="space-y-4">
                <input type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)} className="w-full p-4 border border-gray-200 bg-gray-50 rounded-xl text-base text-center font-bold outline-none focus:border-blue-500" placeholder="Ketik nama Kamu..." required />
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl active:bg-blue-700 shadow-md text-sm">Masuk Eksplorasi</button>
              </form>
              <button onClick={() => setShowAdminModal(true)} className="mt-6 text-xs text-gray-400 font-bold active:text-gray-800 py-2 px-4">Login Admin</button>
            </div>
            {showAdminModal && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
                  <h3 className="text-lg font-extrabold text-gray-900 mb-4">Akses Admin</h3>
                  <input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl mb-2 text-base outline-none focus:border-blue-500" placeholder="Sandi..." />
                  {adminError && <p className="text-red-500 text-xs mb-4 font-bold">{adminError}</p>}
                  <div className="flex gap-2 justify-end mt-4">
                    <button onClick={() => {setShowAdminModal(false); setAdminError(''); setAdminPassword('');}} className="px-4 py-2.5 text-gray-600 bg-gray-100 rounded-xl font-bold text-sm">Batal</button>
                    <button onClick={handleAdminSubmit} className="px-4 py-2.5 text-white bg-blue-600 rounded-xl font-bold text-sm">Masuk</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // --- USER SURVEY SCREEN ---
      if (currentUser.role === 'user' && !currentUser.hasCompletedSurvey) {
        if (surveyStep === 0) {
          return (
            <div className="min-h-screen bg-gray-50 p-4 flex flex-col">
              <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">
                <h1 className="text-lg font-extrabold text-gray-800 flex items-center"><CheckSquare className="w-5 h-5 mr-2 text-blue-600"/> Data Diri</h1>
                <button onClick={handleLogout} className="text-gray-400 active:text-red-500 bg-gray-50 p-2 rounded-full"><LogOut className="w-5 h-5" /></button>
              </header>
              <form onSubmit={handleProfileSubmit} className="flex-1 flex flex-col w-full max-w-sm mx-auto">
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-5">
                  {profileError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-xs font-bold">{profileError}</div>}
                  <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Nama Panggilan</label><input type="text" value={tempProfile.name} onChange={e => setTempProfile({...tempProfile, name: e.target.value})} className="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold outline-none focus:border-blue-500" placeholder="Nama Kamu"/></div>
                  <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Alergi Makanan</label><input type="text" value={tempProfile.diet} onChange={e => setTempProfile({...tempProfile, diet: e.target.value})} className="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold outline-none focus:border-blue-500" placeholder="Kosongkan jika aman"/></div>
                  <div><label className="block text-xs font-bold text-gray-500 uppercase mb-2">Kebutuhan Khusus</label><textarea value={tempProfile.needs} onChange={e => setTempProfile({...tempProfile, needs: e.target.value})} className="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold outline-none focus:border-blue-500 min-h-[80px]" placeholder="Mudah mabuk, dsb."></textarea></div>
                  <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl active:bg-blue-700 shadow-md text-sm mt-2">Lanjut Kuesioner</button>
                </div>
              </form>
            </div>
          );
        }
        const questionIndex = surveyStep - 1;
        const question = QUESTIONS[questionIndex];
        return (
          <div className="min-h-screen bg-gray-50 p-4 flex flex-col">
            <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm"><h1 className="text-lg font-extrabold text-gray-800">Kuesioner</h1><button onClick={handleLogout} className="text-gray-400 active:text-red-500 bg-gray-50 p-2 rounded-full"><LogOut className="w-5 h-5" /></button></header>
            <div className="flex-1 flex flex-col w-full max-w-sm mx-auto">
              <div className="mb-6 bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                <p className="text-[10px] text-blue-600 font-bold uppercase mb-2">Pertanyaan {questionIndex + 1} dari {QUESTIONS.length}</p>
                <div className="w-full bg-gray-100 rounded-full h-1.5 mb-4"><div className="bg-blue-500 h-1.5 rounded-full transition-all" style={{ width: `${((questionIndex + 1) / QUESTIONS.length) * 100}%` }}></div></div>
                <h2 className="text-xl font-extrabold text-gray-800 leading-snug">{question.text}</h2>
              </div>
              <div className="space-y-3">
                {question.options.map((option, idx) => (
                  <button key={idx} onClick={() => handleAnswer(question.id, option.tags)} className="w-full p-4 bg-white border border-gray-200 rounded-2xl text-left active:border-blue-500 active:bg-blue-50 font-bold text-gray-700 text-sm flex items-center justify-between shadow-sm"><span className="pr-4">{option.text}</span><ChevronRight className="w-4 h-4 text-gray-300 flex-shrink-0" /></button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // --- ADMIN SCREEN ---
      if (currentUser.role === 'admin') {
        return (
          <div className="min-h-screen bg-gray-50 pb-20">
            <div className="bg-blue-700 text-white p-5 rounded-b-[2rem] shadow-md">
              <div className="flex justify-between items-center mb-2"><h1 className="text-xl font-extrabold">Pusat Komando</h1><button onClick={handleLogout} className="bg-white/20 p-2 rounded-full"><LogOut className="w-4 h-4" /></button></div>
              <p className="opacity-90 text-xs font-medium">Pantau peserta di sini.</p>
            </div>
            <div className="max-w-4xl mx-auto px-4 mt-6">
              {isDemoMode && <div className="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-r-xl mb-6 shadow-sm"><h3 className="font-bold text-yellow-800 text-sm mb-1">Mode Uji Coba</h3><p className="text-xs text-yellow-700">Aplikasi belum terhubung ke Firebase.</p></div>}
              <div className="bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-xl mb-6 shadow-sm">
                <h3 className="font-bold text-orange-800 flex items-center mb-1 text-sm"><AlertTriangle className="w-4 h-4 mr-2" /> Pengingat Logistik</h3>
                <ul className="list-disc list-inside text-xs text-orange-700 font-medium"><li>03:00 Pagi berangkat dari hotel.</li><li>Kumpulkan pesanan GrabFood di mobil.</li></ul>
              </div>
              <h2 className="text-lg font-extrabold text-gray-800 mb-4 flex items-center"><Users className="w-5 h-5 mr-2 text-blue-600" /> Monitor Pasukan</h2>
              
              <div className="md:hidden space-y-4 mb-8">
                {participants.filter(u => u.role !== 'admin').map(user => (
                  <div key={user.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div className="flex justify-between items-start mb-2">
                      <span className="font-bold text-gray-800">{user.realName || user.name}</span>
                      {user.hasCompletedSurvey ? <span className="inline-flex items-center text-green-700 bg-green-50 px-2 py-1 rounded text-[10px] font-bold"><CheckCircle className="w-3 h-3 mr-1"/> Selesai</span> : <span className="text-gray-500 bg-gray-50 px-2 py-1 rounded text-[10px] font-bold">Menunggu</span>}
                    </div>
                    <div className="text-xs text-gray-600 mb-1"><span className="font-bold">Diet:</span> {user.diet || '-'}</div>
                    <div className="text-xs text-gray-600 mb-3"><span className="font-bold">Catatan:</span> {user.needs || '-'}</div>
                    <div className="flex flex-wrap gap-1 mb-4">{user.interests.map((tag, i) => (<span key={i} className="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded font-bold border border-blue-100">{formatTag(tag)}</span>))}</div>
                    <div className="flex gap-2">
                      <button onClick={() => setModalConfig({ isOpen: true, type: 'reset', user })} className="flex-1 py-2 bg-yellow-50 text-yellow-700 rounded-xl font-bold text-xs flex justify-center items-center"><RefreshCw className="w-3 h-3 mr-1"/> Reset</button>
                      <button onClick={() => setModalConfig({ isOpen: true, type: 'delete', user })} className="flex-1 py-2 bg-red-50 text-red-700 rounded-xl font-bold text-xs flex justify-center items-center"><Trash2 className="w-3 h-3 mr-1"/> Hapus</button>
                    </div>
                  </div>
                ))}
                {participants.filter(u => u.role !== 'admin').length === 0 && <p className="text-center text-sm text-gray-400 font-bold py-4">Belum ada peserta yang masuk.</p>}
              </div>

              <div className="hidden md:block bg-white rounded-2xl shadow-sm mb-10 overflow-hidden border border-gray-100">
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-gray-50 border-b border-gray-100"><tr><th className="p-4 font-bold text-gray-600 text-xs uppercase">Nama</th><th className="p-4 font-bold text-gray-600 text-xs uppercase">Status</th><th className="p-4 font-bold text-gray-600 text-xs uppercase">Diet</th><th className="p-4 font-bold text-gray-600 text-xs uppercase">Minat</th><th className="p-4 font-bold text-center text-gray-600 text-xs uppercase">Aksi</th></tr></thead>
                    <tbody className="divide-y divide-gray-50">
                      {participants.filter(u => u.role !== 'admin').map(user => (
                        <tr key={user.id}>
                          <td className="p-4 font-bold">{user.realName || user.name}</td>
                          <td className="p-4">{user.hasCompletedSurvey ? <span className="text-green-600 text-xs font-bold">Selesai</span> : <span className="text-gray-400 text-xs">Menunggu</span>}</td>
                          <td className="p-4 text-xs">{user.diet || '-'}</td>
                          <td className="p-4"><div className="flex gap-1">{user.interests.slice(0, 2).map((tag, i) => (<span key={i} className="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded font-bold">{formatTag(tag)}</span>))}</div></td>
                          <td className="p-4 text-center flex justify-center gap-2"><button onClick={() => setModalConfig({ isOpen: true, type: 'reset', user })} className="p-2 bg-gray-50 rounded"><RefreshCw className="w-4 h-4 text-gray-600"/></button><button onClick={() => setModalConfig({ isOpen: true, type: 'delete', user })} className="p-2 bg-red-50 rounded"><Trash2 className="w-4 h-4 text-red-600"/></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            
            {modalConfig.isOpen && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
                  <h3 className="text-lg font-extrabold text-gray-900 mb-2">Konfirmasi</h3>
                  <p className="text-gray-600 mb-6 text-sm font-medium">{modalConfig.type === 'delete' ? `Hapus data ${modalConfig.user.name}?` : `Reset kuesioner ${modalConfig.user.name}?`}</p>
                  <div className="flex gap-2 justify-end">
                    <button onClick={() => setModalConfig({ isOpen: false, type: '', user: null })} className="px-4 py-2 text-gray-700 bg-gray-100 rounded-xl font-bold text-sm">Batal</button>
                    <button onClick={executeAction} className={`px-4 py-2 text-white rounded-xl font-bold text-sm ${modalConfig.type === 'delete' ? 'bg-red-600' : 'bg-yellow-500'}`}>Ya, Lanjut</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // --- USER MAIN SCREEN ---
      const renderTabContent = () => {
        if (activeTab === 'jadwal') {
          return (
            <div className="px-4 mt-4">
              <LiveTripStatus />
              <FilterHari />
              <div className="space-y-8">
                {ITINERARY.filter(d => selectedDay === null || d.day === selectedDay).map((day, idx) => (
                  <div key={idx} className="relative">
                    <div className="sticky top-16 z-20 bg-white/90 backdrop-blur-md border border-gray-200 py-3 px-4 rounded-2xl shadow-sm mb-4 flex justify-between items-center">
                      <div><h2 className="text-base font-extrabold text-gray-900">{day.title}</h2><p className="text-blue-600 font-bold text-[10px] uppercase">{day.date}</p></div>
                      <div className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500 text-xs">{day.day}</div>
                    </div>
                    <div className="ml-1">
                      {day.activities.map((act, i) => {
                        const match = isRecommended(act.tags, currentUser.interests);
                        return <ActivityCard key={i} act={act} match={match} />;
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        if (activeTab === 'peta') {
          return (
            <div className="px-4 mt-6 h-[70vh] flex flex-col">
              <h2 className="text-xl font-extrabold text-gray-900 mb-4 flex items-center"><MapIcon className="w-6 h-6 mr-2 text-blue-600" /> Peta Sentral</h2>
              <div className="bg-white rounded-3xl p-2 shadow-sm border border-gray-200 flex-1 overflow-hidden relative">
                 <iframe title="Peta Malaysia" width="100%" height="100%" frameBorder="0" className="rounded-2xl" src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1019992.5132338164!2d101.99616035000001!3d2.7844055!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sm!2sid!4v1700000000000!5m2!1sm!2sid" allowFullScreen></iframe>
              </div>
            </div>
          );
        }

        if (activeTab === 'profil') {
          return (
            <div className="px-4 mt-6">
              <h2 className="text-xl font-extrabold text-gray-900 mb-6 flex items-center"><User className="w-6 h-6 mr-2 text-blue-600" /> Profil Kamu</h2>
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-gray-200 mb-6">
                <div className="mb-6"><p className="text-xs text-gray-400 font-bold uppercase mb-1">Nama</p><p className="text-lg font-extrabold text-gray-900">{currentUser.realName || currentUser.name}</p></div>
                <div className="mb-6"><p className="text-xs text-gray-400 font-bold uppercase mb-1">Pantangan Makanan</p><p className="text-base font-bold text-gray-800">{currentUser.diet || 'Tidak ada'}</p></div>
                <div className="mb-6"><p className="text-xs text-gray-400 font-bold uppercase mb-1">Kebutuhan Khusus</p><p className="text-base font-bold text-gray-800">{currentUser.needs || 'Tidak ada'}</p></div>
                <div>
                  <p className="text-xs text-gray-400 font-bold uppercase mb-2">Minat Utama</p>
                  <div className="flex flex-wrap gap-2">
                    {currentUser.interests.map((tag, i) => (<span key={i} className="bg-blue-50 text-blue-700 text-xs px-3 py-1.5 rounded-lg font-bold border border-blue-100">{formatTag(tag)}</span>))}
                  </div>
                </div>
              </div>
              <button onClick={handleLogout} className="w-full bg-red-50 text-red-600 font-bold py-4 rounded-xl active:bg-red-100 transition-colors shadow-sm flex items-center justify-center">
                <LogOut className="w-5 h-5 mr-2" /> Keluar Akun
              </button>
            </div>
          );
        }

        if (activeTab === 'info') {
          return (
            <div className="px-4 mt-6">
              <h2 className="text-xl font-extrabold text-gray-900 mb-4 flex items-center"><Info className="w-6 h-6 mr-2 text-blue-600" /> Pusat Informasi</h2>
              <div className="mb-6">
                <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Prakiraan Cuaca</p>
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-white border border-gray-200 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-sm">
                    <div className="bg-orange-50 p-3 rounded-full"><Sun className="w-6 h-6 text-orange-500" /></div>
                    <div className="text-center"><p className="text-[10px] text-gray-500 font-bold uppercase">Kuala Lumpur</p><p className="font-extrabold text-gray-800 text-lg">32°C</p></div>
                  </div>
                  <div className="bg-white border border-gray-200 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 shadow-sm">
                    <div className="bg-blue-50 p-3 rounded-full"><CloudRain className="w-6 h-6 text-blue-500" /></div>
                    <div className="text-center"><p className="text-[10px] text-gray-500 font-bold uppercase">Melaka</p><p className="font-extrabold text-gray-800 text-lg">28°C</p></div>
                  </div>
                </div>
              </div>
              <div className="bg-orange-50 border border-orange-200 p-5 rounded-3xl shadow-sm">
                <h3 className="font-extrabold text-orange-800 flex items-center mb-3 text-base"><AlertTriangle className="w-5 h-5 mr-2" /> Aturan Subuh</h3>
                <p className="text-sm text-orange-700 leading-relaxed font-medium mb-3">Hari ke-5 kita wajib berangkat ke KLIA2 jam 03:00 pagi. Barang bawaan harus sudah tertata malam sebelumnya.</p>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-24">
          <div className="relative h-48 bg-gray-900 rounded-b-[2rem] shadow-sm overflow-hidden">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Petronas_Towers_and_KLCC_Park_at_dusk_%282023%29.jpg/800px-Petronas_Towers_and_KLCC_Park_at_dusk_%282023%29.jpg" className="w-full h-full object-cover opacity-50" />
            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            <div className="absolute top-4 right-4">
              <button onClick={handleLogout} className="bg-white/20 p-2 rounded-full text-white"><LogOut className="w-4 h-4" /></button>
            </div>
            <div className="absolute bottom-5 left-5 right-5">
              <h1 className="text-2xl font-extrabold text-white mb-1">Trip Malaysia</h1>
              <p className="text-gray-300 text-xs font-bold uppercase tracking-widest">{currentUser.realName || currentUser.name}</p>
            </div>
          </div>
          <div className="max-w-md mx-auto w-full">{renderTabContent()}</div>
          <BottomNav />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
