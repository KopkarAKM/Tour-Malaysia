        function enableLoginButton(text) {

        function setupListeners() {
            if (!state.authUser) return;

            const participantsRef = collection(db, 'artifacts', appId, 'public', 'data', 'participants');
            onSnapshot(participantsRef, (snapshot) => {
                state.participants = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (state.currentUser && state.currentUser.role !== 'admin') {
                    const updatedUser = state.participants.find(u => u.id === state.currentUser.id);
                    if (updatedUser) {
                        state.currentUser = updatedUser;
                        updateUI();
                    }
                } else if(state.currentUser && state.currentUser.role === 'admin') {
                    if(state.adminTab === 'peserta') renderAdminPeserta();
                }
            }, (error) => console.error(error));

            const masterItineraryRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_state', 'master_itinerary');
            onSnapshot(masterItineraryRef, (docSnap) => {
                if (docSnap.exists()) {
                    state.itinerary = docSnap.data().data || INITIAL_ITINERARY;
                } else {
                    if(!state.isDemoMode) setDoc(masterItineraryRef, { data: INITIAL_ITINERARY });
                    state.itinerary = INITIAL_ITINERARY;
                }
                buildFlatSchedule();
                if(state.currentUser) updateUI();
            });

        function buildFlatSchedule() {
            state.flatSchedule = [];
            state.itinerary.forEach(day => {
                const dateStr = DATE_MAP[day.date];
                day.activities.forEach(act => {
                    state.flatSchedule.push({ ...act, datetime: new Date(`${dateStr}T${act.time}:00+08:00`), dayTitle: day.title, dayDate: day.date });
                });
            });
        }

        // --- HELPER FUNCTIONS ---
        const getTagEmoji = (tag) => {
            if (tag.includes('kuliner')) return '🍽️ ';
            if (tag.includes('foto')) return '📸 ';
            if (tag.includes('belanja') || tag.includes('oleh')) return '🛍️ ';
            return '🍃 ';
        };

        const formatTag = (tag) => getTagEmoji(tag) + tag.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());

        const getPersonalizedInsights = (actId, userInterests) => {
            const insightsForAct = PERSONALIZED_INSIGHTS[actId];
            if (!insightsForAct || !userInterests || userInterests.length === 0) return null;
            for (const interest of userInterests) {
                if (insightsForAct[interest]) return insightsForAct[interest];
                const partial = Object.keys(insightsForAct).find(k => interest.includes(k) || k.includes(interest));
                if (partial) return insightsForAct[partial];
            }
            return null;
        };

        const isRecommended = (activityTags, userInterests) => {
            if (!userInterests || userInterests.length === 0) return false;
            if (userInterests.includes('semua')) return true;
            return (activityTags || []).some(tag => userInterests.includes(tag));
        };

        // Google Places API Loader
        let isGoogleMapsLoading = false;
        let isGoogleMapsLoaded = false;
        function loadGooglePlaces(callback) {
            if (isGoogleMapsLoaded) { callback(); return; }
            if (isGoogleMapsLoading) { setTimeout(() => loadGooglePlaces(callback), 500); return; }
            if (!GOOGLE_PLACES_API_KEY) return;
            
            isGoogleMapsLoading = true;
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_PLACES_API_KEY}&libraries=places`;
            script.async = true;
            script.defer = true;
            script.onload = () => { isGoogleMapsLoaded = true; callback(); };
            document.head.appendChild(script);
        }

        window.triggerImageLoad = (imgId, location) => {
            if(!GOOGLE_PLACES_API_KEY) return;
            if(state.photoCache[location]) {
                const el = document.getElementById(imgId);
                if(el && state.photoCache[location] !== 'error') el.src = state.photoCache[location];
                return;
            }
            loadGooglePlaces(() => {
                if(state.photoCache[location]) return;
                const service = new window.google.maps.places.PlacesService(document.createElement('div'));
                service.textSearch({ query: location + ' Malaysia' }, (results, status) => {
                    if (status === window.google.maps.places.PlacesServiceStatus.OK && results[0] && results[0].photos) {
                        const url = results[0].photos[0].getUrl({ maxWidth: 800 });
                        state.photoCache[location] = url;
                        const el = document.getElementById(imgId);
                        if(el) el.src = url;
                    } else {
                        state.photoCache[location] = 'error';
                    }
                });
            });
        };

        function renderLiveTripStatus() {
            let currentAct = null, nextAct = null, status = 'PRE-TRIP';
            if (state.flatSchedule.length > 0) {
                if (state.now < state.flatSchedule[0].datetime) status = 'PRE-TRIP';
                else if (state.now > state.flatSchedule[state.flatSchedule.length - 1].datetime) status = 'POST-TRIP';
                else {
                    status = 'ON-TRIP';
                    for (let i = 0; i < state.flatSchedule.length; i++) {
                        if (state.now >= state.flatSchedule[i].datetime && (!state.flatSchedule[i+1] || state.now < state.flatSchedule[i+1].datetime)) {
                            currentAct = state.flatSchedule[i];
                            nextAct = state.flatSchedule[i+1] || null;

                        }

            }

            let html = '';
            if (status === 'PRE-TRIP') {
                html = `<div class="bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl p-4 mb-6 text-white shadow-md border border-blue-500 relative overflow-hidden"><div class="absolute top-0 right-0 p-4 opacity-20"><i data-lucide="calendar" class="w-16 h-16"></i></div><h3 class="font-extrabold text-sm mb-1 flex items-center"><i data-lucide="navigation" class="w-4 h-4 mr-2"></i> Persiapan Keberangkatan</h3><p class="text-xs text-blue-100 font-medium">Perjalanan dimulai 30 April 2026. Persiapkan fisik dan dokumen Kamu.</p></div>`;

            } else {
                html = `
                <div class="bg-white rounded-2xl p-4 mb-6 shadow-md border border-blue-100 relative overflow-hidden">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center text-blue-600"><div class="w-2.5 h-2.5 bg-blue-600 rounded-full mr-2 live-indicator"></div><span class="text-xs font-extrabold uppercase tracking-widest">Pelacak Waktu</span></div>

                        <p class="text-sm font-extrabold text-gray-900 leading-tight">${currentAct.desc}</p>

                    </div>` : ''}
                    ${nextAct ? `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 flex items-start">
                        <i data-lucide="arrow-right" class="w-4 h-4 text-gray-400 mr-2 mt-0.5 flex-shrink-0"></i>

                    </div>` : ''}
                </div>`;
            }
            
            const container = document.getElementById('dash-live-status');
            if(container) {
                container.innerHTML = html;
                if(window.lucide) window.lucide.createIcons();
            }
            return html;
        }

                    </div>
                    <div class="bg-orange-50 border border-orange-200 p-5 rounded-3xl shadow-sm">
                        <h3 class="font-extrabold text-orange-800 flex items-center mb-3 text-base"><i data-lucide="alert-triangle" class="w-5 h-5 mr-2"></i> Aturan Subuh</h3>
                        <p class="text-sm text-orange-700 leading-relaxed font-medium mb-3">Hari ke-5 kita wajib berangkat ke KLIA2 dini hari. Barang bawaan harus tertata malam sebelumnya.</p>
                    </div>
                </div>`;
        }

        // --- ADMIN VIEWS ---
        function renderAdminNav() {
            const tabs = [
                { id: 'peserta', label: 'Data Peserta' },
                { id: 'logistik', label: 'Logistik' },
                { id: 'editjadwal', label: 'Edit Jadwal' }
            ];
            document.getElementById('admin-nav').innerHTML = tabs.map(t => `
                <button onclick="window.switchAdminTab('${t.id}')" class="px-4 py-1.5 text-xs font-bold rounded-lg transition-colors whitespace-nowrap ${state.adminTab === t.id ? 'bg-white text-blue-700 shadow-sm' : 'text-blue-100 hover:bg-blue-700'}">${t.label}</button>
            `).join('');
        }

        window.renderAdminPeserta = () => {
            const users = state.participants.filter(u => u?.role !== 'admin');
            let html = `<div class="space-y-4"><h2 class="text-lg font-extrabold text-gray-800 mb-4 flex items-center"><i data-lucide="users" class="w-5 h-5 mr-2 text-blue-600"></i> Monitor Pasukan</h2>`;
            
            // Mobile View
            html += `<div class="md:hidden space-y-4 mb-8">`;
            if (users.length === 0) html += `<p class="text-center text-sm text-gray-400 font-bold py-4">Belum ada peserta.</p>`;
            users.forEach(user => {
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-bold text-gray-800">${user.realName || user.name}</span>
                        ${user.hasCompletedSurvey ? `<span class="inline-flex items-center text-green-700 bg-green-50 px-2 py-1 rounded text-[10px] font-bold"><i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> Selesai</span>` : `<span class="text-gray-500 bg-gray-50 px-2 py-1 rounded text-[10px] font-bold">Menunggu</span>`}
                    </div>
                    <div class="text-xs text-gray-600 mb-1"><span class="font-bold">Diet:</span> ${user.diet || '-'}</div>
                    <div class="text-xs text-gray-600 mb-3"><span class="font-bold">Catatan:</span> ${user.needs || '-'}</div>
                    <div class="flex flex-wrap gap-1 mb-4">${(user.interests || []).map(t => `<span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded font-bold border border-blue-100">${formatTag(t)}</span>`).join('')}</div>
                    <div class="flex gap-2">
                        <button onclick="window.openActionModal('reset', '${user.id}')" class="flex-1 py-2 bg-yellow-50 text-yellow-700 rounded-xl font-bold text-xs flex justify-center items-center"><i data-lucide="refresh-cw" class="w-3 h-3 mr-1"></i> Reset</button>
                        <button onclick="window.openActionModal('delete', '${user.id}')" class="flex-1 py-2 bg-red-50 text-red-700 rounded-xl font-bold text-xs flex justify-center items-center"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i> Hapus</button>
                    </div>
                </div>`;
            });
            html += `</div>`;

            // Desktop View
            html += `
            <div class="hidden md:block bg-white rounded-2xl shadow-sm mb-10 overflow-hidden border border-gray-100">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 border-b border-gray-100"><tr><th class="p-4 font-bold text-gray-600 text-xs uppercase">Nama</th><th class="p-4 font-bold text-gray-600 text-xs uppercase">Status</th><th class="p-4 font-bold text-gray-600 text-xs uppercase">Diet</th><th class="p-4 font-bold text-gray-600 text-xs uppercase">Minat</th><th class="p-4 font-bold text-center text-gray-600 text-xs uppercase">Aksi</th></tr></thead>
                    <tbody class="divide-y divide-gray-50">`;
            users.forEach(user => {
                html += `
                    <tr>
                        <td class="p-4 font-bold">${user.realName || user.name}</td>
                        <td class="p-4">${user.hasCompletedSurvey ? '<span class="text-green-600 text-xs font-bold">Selesai</span>' : '<span class="text-gray-400 text-xs">Menunggu</span>'}</td>
                        <td class="p-4 text-xs">${user.diet || '-'}</td>
                        <td class="p-4"><div class="flex gap-1">${(user.interests || []).slice(0, 2).map(t => `<span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded font-bold">${formatTag(t)}</span>`).join('')}</div></td>
                        <td class="p-4 text-center flex justify-center gap-2"><button onclick="window.openActionModal('reset', '${user.id}')" class="p-2 bg-gray-50 rounded"><i data-lucide="refresh-cw" class="w-4 h-4 text-gray-600"></i></button><button onclick="window.openActionModal('delete', '${user.id}')" class="p-2 bg-red-50 rounded"><i data-lucide="trash-2" class="w-4 h-4 text-red-600"></i></button></td>
                    </tr>`;
            });
            html += `</tbody></table></div></div>`;
            document.getElementById('admin-content').innerHTML = html;
        };

        function renderAdminLogistik() {
            const usersWithDiet = state.participants.filter(u => u?.role !== 'admin' && u.diet && u.diet.toLowerCase() !== 'tidak ada' && u.diet !== '-');
            const usersWithNeeds = state.participants.filter(u => u?.role !== 'admin' && u.needs && u.needs.toLowerCase() !== 'tidak ada' && u.needs !== '-');

            let html = `
            <div class="space-y-6">
                <h2 class="text-lg font-extrabold text-gray-800 flex items-center"><i data-lucide="clipboard-list" class="w-5 h-5 mr-2 text-blue-600"></i> Pelayanan & Logistik</h2>
                ${renderHotelVoucher()}
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h3 class="font-extrabold text-sm text-gray-900 mb-3 flex items-center"><i data-lucide="utensils" class="w-4 h-4 mr-2 text-orange-500"></i> Peringatan Pantangan Makanan</h3>
                    ${usersWithDiet.length > 0 ? `<ul class="space-y-2">${usersWithDiet.map(u => `<li class="text-xs bg-orange-50 p-2 rounded border border-orange-100"><span class="font-bold">${u.realName}:</span> ${u.diet}</li>`).join('')}</ul>` : `<p class="text-xs text-gray-500">Tidak ada pantangan makanan khusus.</p>`}
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h3 class="font-extrabold text-sm text-gray-900 mb-3 flex items-center"><i data-lucide="info" class="w-4 h-4 mr-2 text-blue-500"></i> Kebutuhan Khusus</h3>
                    ${usersWithNeeds.length > 0 ? `<ul class="space-y-2">${usersWithNeeds.map(u => `<li class="text-xs bg-blue-50 p-2 rounded border border-blue-100"><span class="font-bold">${u.realName}:</span> ${u.needs}</li>`).join('')}</ul>` : `<p class="text-xs text-gray-500">Tidak ada kebutuhan khusus tercatat.</p>`}
                </div>
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h3 class="font-extrabold text-sm text-gray-900 mb-3 flex items-center"><i data-lucide="car" class="w-4 h-4 mr-2 text-green-500"></i> Daftar Tugas Admin</h3>
                    <div class="space-y-3">
                        <label class="flex items-start gap-2 text-xs text-gray-700"><input type="checkbox" class="mt-0.5 rounded text-blue-600" /> H-3: Pastikan semua peserta sudah mengisi MDAC (Malaysia Digital Arrival Card).</label>
                        <label class="flex items-start gap-2 text-xs text-gray-700"><input type="checkbox" class="mt-0.5 rounded text-blue-600" /> H-1: Cek masa berlaku paspor peserta.</label>
                        <label class="flex items-start gap-2 text-xs text-gray-700"><input type="checkbox" class="mt-0.5 rounded text-blue-600" /> Hari 1: Konfirmasi titik jemput di KLIA dengan sopir Hiace.</label>
                        <label class="flex items-start gap-2 text-xs text-gray-700"><input type="checkbox" class="mt-0.5 rounded text-blue-600" /> Harian: Rekap pesanan GrabFood jam 17:00 saat peserta di mobil.</label>
                        <label class="flex items-start gap-2 text-xs text-gray-700"><input type="checkbox" class="mt-0.5 rounded text-blue-600" /> Hari 5: Bangunkan peserta jam 02:00 pagi. Kendaraan jalan tepat 03:00 ke KLIA2.</label>
                    </div>
                </div>
            </div>`;
            document.getElementById('admin-content').innerHTML = html;
        }

        function renderAdminEditJadwal() {
            let html = `<div class="space-y-8"><h2 class="text-lg font-extrabold text-gray-800 mb-4 flex items-center"><i data-lucide="edit-3" class="w-5 h-5 mr-2 text-blue-600"></i> Editor Jadwal Perjalanan</h2>`;
            state.itinerary.forEach((day, dayIdx) => {
                html += `
                <div class="bg-white rounded-3xl p-4 border border-gray-100 shadow-sm">
                    <div class="mb-4"><span class="bg-blue-600 text-white px-2.5 py-1 rounded-md text-[10px] font-bold uppercase mb-1 inline-block">Hari ${day.day}</span><h3 class="text-lg font-extrabold text-gray-900 leading-tight">${day.title}</h3></div>
                    <div class="space-y-0">`;
                day.activities.forEach((act, actIdx) => {
                    html += renderActivityCard(act, dayIdx, actIdx, false, true);
                });
                html += `</div></div>`;
            });
            html += `</div>`;
            document.getElementById('admin-content').innerHTML = html;
        }

        // Run
        init();

    </script>
</body>
</html>
