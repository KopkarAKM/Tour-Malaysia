    const getTagEmoji = (tag) => {
      if (tag.includes('kuliner')) return '🍽️ ';
      if (tag.includes('foto')) return '📸 ';
      if (tag.includes('belanja') || tag.includes('oleh')) return '🛍️ ';
      return '🍃 ';
    };

    const formatTag = (tag) => {
      return getTagEmoji(tag) + tag.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
    };

    function App() {
      const [participants, setParticipants] = useState([]);
      const [authUser, setAuthUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentAnswers, setCurrentAnswers] = useState({});
      const [surveyStep, setSurveyStep] = useState(0); 
      const [tempProfile, setTempProfile] = useState({ name: '', diet: '', needs: '' });
      const [loginName, setLoginName] = useState('');
      const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', user: null });
      
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [adminError, setAdminError] = useState('');
      const [profileError, setProfileError] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth Error:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setAuthUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!authUser) return;
        const participantsRef = collection(db, 'artifacts', appId, 'public', 'data', 'participants');
        const unsubscribe = onSnapshot(participantsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setParticipants(data);
          
          if (currentUser && currentUser.role !== 'admin') {
            const updatedUser = data.find(u => u.id === currentUser.id);
            if (updatedUser) setCurrentUser(updatedUser);
          }
        }, (error) => {
          console.error("Snapshot error:", error);
        });
        return () => unsubscribe();
      }, [authUser, currentUser?.id]);

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        const trimmedName = loginName.trim();
        if (!trimmedName) return;

        let user = participants.find(u => u.name.toLowerCase() === trimmedName.toLowerCase() || u.realName?.toLowerCase() === trimmedName.toLowerCase());
        
        if (!user) {
          const newId = 'u_' + Date.now();
          user = { 
            id: newId, 
            name: trimmedName, 
            realName: trimmedName, 
            role: 'user', 
            hasCompletedSurvey: false, 
            interests: [], 
            diet: '', 
            needs: '',
            checkedTasks: []
          };
          
          if (authUser) {

          hasCompletedSurvey: true, 
          interests: uniqueTags

                    </p>
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => setModalConfig({ isOpen: false, type: '', user: null })} className="px-5 py-3 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold transition">Batal</button>
                      <button onClick={executeAction} className={`px-5 py-3 text-white rounded-xl font-bold transition ${modalConfig.type === 'delete' ? 'bg-red-600 hover:bg-red-700' : 'bg-yellow-500 hover:bg-yellow-600'}`}>Ya, Lanjutkan</button>
                    </div>
                  </div>
                </div>
              )}
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] pb-24 font-sans">
          <div className="relative h-64 bg-gray-900 overflow-hidden rounded-b-[2.5rem] shadow-lg">
            <img src="https://images.unsplash.com/photo-1541838634568-1afec5515259?auto=format&fit=crop&w=1000&q=80" alt="KL" className="w-full h-full object-cover opacity-60 mix-blend-overlay" />
            <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            <div className="absolute top-6 right-6">
              <button onClick={handleLogout} className="bg-white/20 p-2.5 rounded-full hover:bg-red-500/80 backdrop-blur-md transition-colors text-white">
                <LogOut className="w-5 h-5" />
              </button>
            </div>
            <div className="absolute bottom-6 left-6 right-6">
              <h1 className="text-3xl font-extrabold text-white mb-1">Halo, {currentUser.realName || currentUser.name}!</h1>
              <p className="text-gray-300 text-sm font-medium">Jadwal ini dirancang khusus untukmu.</p>
              <div className="flex flex-wrap gap-2 mt-4">
                {currentUser.interests.map((tag, i) => (
                  <span key={i} className="bg-white/20 backdrop-blur-md border border-white/30 text-white text-xs px-3 py-1 rounded-full font-bold shadow-sm">
                    {formatTag(tag)}
                  </span>
                ))}
              </div>
            </div>
          </div>

          <div className="max-w-md mx-auto px-5 mt-6">
            <WeatherWidget />
            <TripSummary />

            <div className="space-y-10">
              {ITINERARY.map((day, idx) => (
                <div key={idx} className="relative">
                  <div className="sticky top-4 z-20 bg-white/80 backdrop-blur-lg border border-gray-200 py-3 px-5 rounded-2xl shadow-sm mb-6 flex justify-between items-center">
                    <div>
                      <h2 className="text-xl font-extrabold text-gray-900">{day.title}</h2>
                      <p className="text-blue-600 font-bold text-xs uppercase tracking-widest">{day.date}</p>
                    </div>
                    <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500">
                      {day.day}
                    </div>
                  </div>
                  
                  <div className="ml-2">
                    {day.activities.map((act, i) => {
                      const match = isRecommended(act.tags, currentUser.interests);
                      return <ActivityCard key={i} act={act} match={match} />;
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
