      return '🍃 ';
    };

    const formatTag = (tag) => {
      return getTagEmoji(tag) + tag.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
    };

    const getPersonalizedInsights = (actId, userInterests) => {
      const insightsForAct = PERSONALIZED_INSIGHTS[actId];
      if (!insightsForAct || !userInterests || userInterests.length === 0) return null;
      let bestInsight = null;
      for (const interest of userInterests) {
        if (insightsForAct[interest]) { bestInsight = insightsForAct[interest]; break; }
        const partialMatchKey = Object.keys(insightsForAct).find(k => interest.includes(k) || k.includes(interest));
        if (partialMatchKey) { bestInsight = insightsForAct[partialMatchKey]; break; }
      }
      return bestInsight;
    };

    const getFallbackImage = (seed) => {
      return `https://api.dicebear.com/8.x/shapes/svg?seed=${encodeURIComponent(seed)}&backgroundColor=e2e8f0`;
    };

    const isRecommended = (activityTags, userInterests) => {
      if (!userInterests || !Array.isArray(userInterests) || userInterests.length === 0) return false;
      if (userInterests.includes('semua')) return true;
      return (activityTags || []).some(tag => userInterests.includes(tag));
    };

    function App() {
      const [itinerary, setItinerary] = useState(INITIAL_ITINERARY);
      const [participants, setParticipants] = useState([]);
      const [authUser, setAuthUser] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentAnswers, setCurrentAnswers] = useState({});
      const [surveyStep, setSurveyStep] = useState(0); 
      const [tempProfile, setTempProfile] = useState({ name: '', diet: '', needs: '' });
      const [loginName, setLoginName] = useState('');
      const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', user: null });
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [adminError, setAdminError] = useState('');
      const [profileError, setProfileError] = useState('');
      const [isDemoMode, setIsDemoMode] = useState(!isFirebaseActive);
      
      const [activeTab, setActiveTab] = useState('jadwal');
      const [adminTab, setAdminTab] = useState('peserta'); 
      const [selectedDay, setSelectedDay] = useState(null);
      const [now, setNow] = useState(new Date());

      const [editingAct, setEditingAct] = useState(null);

      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 60000); 
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (!isFirebaseActive) return;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (error) { console.error("Auth Error:", error); setIsDemoMode(true); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setAuthUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!isFirebaseActive || !authUser) return;
        
        const participantsRef = collection(db, 'trip_planner_data');
        const unsubParticipants = onSnapshot(participantsRef, (snapshot) => {
          const data = snapshot.docs.filter(d => d.id !== 'master_itinerary').map(doc => ({ id: doc.id, ...doc.data() }));
          setParticipants(data || []);
          if (currentUser && currentUser.role !== 'admin') {
            const updatedUser = (data || []).find(u => u.id === currentUser.id);
            if (updatedUser) setCurrentUser(updatedUser);
          }
        }, (error) => console.error("Snapshot error:", error));

        const unsubItinerary = onSnapshot(doc(db, 'trip_planner_data', 'master_itinerary'), (docSnap) => {
          if (docSnap.exists()) {
            setItinerary(docSnap.data().data || INITIAL_ITINERARY);
          } else {
            setDoc(doc(db, 'trip_planner_data', 'master_itinerary'), { data: INITIAL_ITINERARY });
            setItinerary(INITIAL_ITINERARY);
          }
        });

        return () => { unsubParticipants(); unsubItinerary(); };
      }, [authUser, currentUser?.id]);

      const flatSchedule = [];
      (itinerary || []).forEach(day => {
        const dateStr = DATE_MAP[day.date];
        (day.activities || []).forEach(act => {
          flatSchedule.push({ ...act, datetime: new Date(`${dateStr}T${act.time}:00+08:00`), dayTitle: day.title, dayDate: day.date });
        });
      });

      const handleLoginSubmit = async (e) => {
        e.preventDefault();
        const trimmedName = loginName.trim();
        if (!trimmedName) return;

        let user = (participants || []).find(u => u.name.toLowerCase() === trimmedName.toLowerCase() || u.realName?.toLowerCase() === trimmedName.toLowerCase());
        
        if (!user) {
          const newId = 'u_' + Date.now();
          user = { id: newId, name: trimmedName, realName: trimmedName, role: 'user', hasCompletedSurvey: false, interests: [], diet: '', needs: '', checkedTasks: [] };
          if (isFirebaseActive && authUser) {
            const docRef = doc(db, 'trip_planner_data', newId);
            await setDoc(docRef, user);
          } else {
            setParticipants(prev => [...(prev || []), user]);
          }
        } else {
          if(!user.checkedTasks) user.checkedTasks = [];
        }

        setCurrentUser(user);
        setSurveyStep(0);
        setCurrentAnswers({});
        setTempProfile({ name: user.realName || '', diet: user.diet || '', needs: user.needs || '' });
        setActiveTab('jadwal');
        setSelectedDay(null);
      };

      const handleAdminSubmit = () => {
        if (adminPassword === "admin123") {
          setCurrentUser({ id: 'admin', name: 'Alhamdi', role: 'admin' });
          setSurveyStep(0);
          setShowAdminModal(false);
          setAdminPassword('');
          setAdminError('');
          setAdminTab('peserta');
        } else {
          setAdminError("Password salah.");
        }
      };

      const handleLogout = () => { setCurrentUser(null); setLoginName(''); };

      const handleProfileSubmit = async (e) => {
        e.preventDefault();
        if (!tempProfile.name.trim()) { setProfileError('Isi nama Kamu.'); return; }
        setProfileError('');
        const updatedUser = { ...currentUser, realName: tempProfile.name, diet: tempProfile.diet || 'Tidak ada', needs: tempProfile.needs || 'Tidak ada' };
        setCurrentUser(updatedUser);
        setSurveyStep(1); 
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await setDoc(docRef, updatedUser, { merge: true });
        } else {
          setParticipants(prev => (prev || []).map(u => u.id === currentUser.id ? updatedUser : u));
        }
      };

      const handleAnswer = (questionId, tags) => {
        setCurrentAnswers(prev => ({ ...prev, [questionId]: tags }));
        if (surveyStep < QUESTIONS.length) { setSurveyStep(prev => prev + 1); } 
        else { finishSurvey(tags, questionId); }
      };

      const finishSurvey = async (lastTags, lastQuestionId) => {
        const allAnswers = { ...currentAnswers, [lastQuestionId]: lastTags };
        let calculatedTags = [];
        Object.values(allAnswers).forEach(tags => calculatedTags = [...calculatedTags, ...(tags || [])]);
        const uniqueTags = [...new Set(calculatedTags)];
        const finalUserData = { ...currentUser, hasCompletedSurvey: true, interests: uniqueTags };
        setCurrentUser(finalUserData);
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await setDoc(docRef, finalUserData, { merge: true });
        } else {
          setParticipants(prev => (prev || []).map(u => u.id === currentUser.id ? finalUserData : u));
        }
      };

      const toggleTask = async (taskId) => {
        if (currentUser?.role === 'admin') return;
        const currentTasks = currentUser?.checkedTasks || [];
        const isChecked = currentTasks.includes(taskId);
        let newTasks = isChecked ? currentTasks.filter(id => id !== taskId) : [...currentTasks, taskId];
        const updatedUser = { ...currentUser, checkedTasks: newTasks };
        setCurrentUser(updatedUser);
        if (isFirebaseActive && authUser) {
          const docRef = doc(db, 'trip_planner_data', currentUser.id);
          await updateDoc(docRef, { checkedTasks: newTasks });
        } else {
           setParticipants(prev => (prev || []).map(u => u.id === currentUser.id ? updatedUser : u));
        }
      };

      const executeAction = async () => {
        if (!modalConfig.user) return;
        if (modalConfig.type === 'delete') {
          if (isFirebaseActive && authUser) {
            const userRef = doc(db, 'trip_planner_data', modalConfig.user.id);
            await deleteDoc(userRef);
          } else { setParticipants(prev => (prev || []).filter(u => u?.id !== modalConfig.user.id)); }
        } else if (modalConfig.type === 'reset') {
           const resetData = { hasCompletedSurvey: false, interests: [], diet: '', needs: '', checkedTasks: [] };
           if (isFirebaseActive && authUser) {
              const userRef = doc(db, 'trip_planner_data', modalConfig.user.id);
              await updateDoc(userRef, resetData);
           } else { setParticipants(prev => (prev || []).map(u => u?.id === modalConfig.user.id ? {...u, ...resetData} : u)); }
        }
        setModalConfig({ isOpen: false, type: '', user: null });
      };

      const handleSaveActivity = async (e) => {
        e.preventDefault();
        const newItinerary = [...(itinerary || [])];
        if(newItinerary[editingAct.dayIdx] && newItinerary[editingAct.dayIdx].activities) {
            newItinerary[editingAct.dayIdx].activities[editingAct.actIdx] = editingAct.data;
        }
        if (isFirebaseActive && authUser) {
          await setDoc(doc(db, 'trip_planner_data', 'master_itinerary'), { data: newItinerary });
        } else {
          setItinerary(newItinerary);
        }
        setEditingAct(null);
      };

      const ActivityCard = ({ act, dayIdx, actIdx, match, isAdmin }) => {
        if (!act) return null;
        const userTasks = currentUser?.checkedTasks || [];
        const allChecked = (act.todo && act.todo.length > 0) ? act.todo.every((_, idx) => userTasks.includes(`${act.id}_t${idx}`)) : false;
        const personalizedInsight = getPersonalizedInsights(act.id, currentUser?.interests || []);
        const souvenirs = SOUVENIR_RECOMMENDATIONS[act.id];

        const handleImageError = (e) => {
          e.target.onerror = null; 
          e.target.src = getFallbackImage(act.desc || act.title || 'trip');
        };

        return (
          <div className="relative pl-5 pb-6" id={`act-${act.id}`}>
            <div className="absolute left-[9px] top-6 bottom-0 w-0.5 bg-blue-200"></div>
            <div className={`absolute left-0 top-1.5 w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm z-10 ${allChecked && !isAdmin ? 'bg-green-500' : 'bg-blue-600'}`}>
               {allChecked && !isAdmin ? <CheckCircle className="w-2.5 h-2.5 text-white" /> : <Clock className="w-2.5 h-2.5 text-white" />}
            </div>

            <div className={`rounded-2xl overflow-hidden shadow-md transition-all duration-300 bg-white border ${match ? 'border-blue-400 ring-1 ring-blue-100' : 'border-gray-100'}`}>
              <div className="relative h-32 md:h-48 w-full group overflow-hidden">
                <img 
                  src={act.thumbnail || getFallbackImage(act.desc)} 
                  alt={act.desc} 
                  className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                  onError={handleImageError}
                />
                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-4">
                  <div className="flex justify-between items-end">
                    <div>
                      <span className="text-blue-300 font-bold text-xs mb-1 block">{act.time}</span>
                      <h3 className="text-white text-base md:text-lg font-bold leading-tight">{act.desc}</h3>
                    </div>
                    {isAdmin && (
                      <button onClick={() => setEditingAct({ dayIdx, actIdx, data: { ...act } })} className="bg-white/20 p-2 rounded-lg backdrop-blur-sm text-white hover:bg-white/40">
                        <Edit3 className="w-4 h-4" />
                      </button>
                    )}
                  </div>
                </div>
              </div>

              <div className="p-4">
                {match && <div className="mb-3"><span className="inline-block bg-blue-600 text-white text-[10px] px-2 py-1 rounded font-bold shadow-sm">Rekomendasi Untukmu</span></div>}
                
                <div className="flex flex-wrap gap-2 mb-4">
                  {(act.tags || []).map((tag, tIdx) => (<span key={tIdx} className="text-[10px] md:text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-md font-bold border border-gray-200">{formatTag(tag)}</span>))}
                </div>

                {(personalizedInsight || act.insight) && (
                  <div className="mb-4 bg-blue-50 p-3 rounded-xl border border-blue-100 text-xs md:text-sm text-blue-900 shadow-sm">
                    <Compass className="w-4 h-4 inline-block mr-1 mb-0.5 text-blue-600" />
                    <span className="font-bold">Info Spesial:</span> {personalizedInsight || act.insight}
                  </div>
                )}

                {souvenirs && (
                  <div className="mb-4 bg-pink-50 p-3 rounded-xl border border-pink-100 text-xs md:text-sm text-pink-900 shadow-sm">
                    <div className="flex items-center mb-2">
                      <ShoppingBag className="w-4 h-4 mr-2 text-pink-600" />
                      <span className="font-bold">Rekomendasi Oleh-oleh:</span>
                    </div>
                    <ul className="list-disc pl-6 space-y-1">
                      {(souvenirs || []).map((item, idx) => (
                        <li key={idx} className="font-medium text-pink-800">{item}</li>
                      ))}
                    </ul>
                  </div>
                )}

                {act.location && (
                  <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.location)}`} target="_blank" rel="noopener noreferrer" className="mb-4 flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-200 text-xs font-bold text-gray-700 active:bg-gray-200 transition-colors">
                    <span className="flex items-center gap-2"><MapPin className="w-4 h-4 text-red-500" /> Buka Peta {act.location.split(',')[0]}</span>
                    <ExternalLink className="w-4 h-4 text-gray-400" />
                  </a>
                )}

                {act.info && (
                  <div className="flex mb-4 bg-yellow-50 p-3 rounded-xl border border-yellow-100 text-xs md:text-sm text-yellow-800">
                    <Info className="w-4 h-4 mr-2 flex-shrink-0 text-yellow-600" /><p>{act.info}</p>
                  </div>
                )}

                {act.todo && act.todo.length > 0 && !isAdmin && (
                  <div className="space-y-2 mt-2">
                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Daftar Kegiatan:</p>
                    {(act.todo || []).map((task, idx) => {
                      const taskId = `${act.id}_t${idx}`;
                      const isChecked = userTasks.includes(taskId);
                      const canEdit = currentUser?.role === 'user';
                      
                      return (
                        <label key={idx} className={`flex items-start gap-3 p-2 rounded-lg transition-colors cursor-pointer ${isChecked ? 'bg-green-50' : 'active:bg-gray-50'}`}>
                          <input type="checkbox" checked={isChecked} onChange={() => toggleTask(taskId)} disabled={!canEdit} className="mt-0.5 w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                          <span className={`text-xs leading-tight mt-1 ${isChecked ? 'line-through text-gray-400' : 'text-gray-700 font-bold'}`}>{task}</span>
                        </label>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      const LiveTripStatus = () => {
        let currentAct = null;
        let nextAct = null;
        let status = 'PRE-TRIP';

        if (flatSchedule.length > 0) {
          if (now < flatSchedule[0].datetime) {
            status = 'PRE-TRIP';
            nextAct = flatSchedule[0];
          } else if (now > flatSchedule[flatSchedule.length - 1].datetime) {
            status = 'POST-TRIP';
          } else {
            status = 'ON-TRIP';
            for (let i = 0; i < flatSchedule.length; i++) {
              if (now >= flatSchedule[i].datetime && (!flatSchedule[i+1] || now < flatSchedule[i+1].datetime)) {
                currentAct = flatSchedule[i];
                nextAct = flatSchedule[i+1] || null;
                break;
              }
            }
          }
        }

        if (status === 'PRE-TRIP') {
          return (
            <div className="bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl p-4 mb-6 text-white shadow-md border border-blue-500 relative overflow-hidden">
              <div className="absolute top-0 right-0 p-4 opacity-20"><Calendar className="w-16 h-16"/></div>
              <h3 className="font-extrabold text-sm mb-1 flex items-center"><Navigation className="w-4 h-4 mr-2" /> Persiapan Keberangkatan</h3>
              <p className="text-xs text-blue-100 font-medium">Perjalanan dimulai 30 April 2026. Persiapkan fisik dan dokumen Kamu.</p>
            </div>
          );
        }

        if (status === 'POST-TRIP') {
          return (
             <div className="bg-gradient-to-r from-green-600 to-green-700 rounded-2xl p-4 mb-6 text-white shadow-md border border-green-500">
              <h3 className="font-extrabold text-sm mb-1 flex items-center"><CheckCircle className="w-4 h-4 mr-2" /> Misi Selesai</h3>
              <p className="text-xs text-green-100 font-medium">Seluruh rangkaian tur Malaysia diselesaikan dengan baik.</p>
            </div>
          );
        }

        return (
          <div className="bg-white rounded-2xl p-4 mb-6 shadow-md border border-blue-100 relative overflow-hidden">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center text-blue-600">
                <div className="w-2.5 h-2.5 bg-blue-600 rounded-full mr-2 live-indicator"></div>
                <span className="text-xs font-extrabold uppercase tracking-widest">Pelacak Waktu</span>
              </div>
              <span className="text-[10px] font-bold text-gray-400">{now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
            
            {currentAct && (
              <div className="mb-3 border-l-2 border-blue-500 pl-3">
                <p className="text-[10px] font-bold text-gray-400 uppercase">Saat Ini</p>
                <p className="text-sm font-extrabold text-gray-900 leading-tight">{currentAct.desc}</p>
                <p className="text-xs text-blue-600 font-bold flex items-center mt-1"><MapPin className="w-3 h-3 mr-1"/> {currentAct.location}</p>
              </div>
            )}
            
            {nextAct && (
              <div className="bg-gray-50 p-3 rounded-xl border border-gray-100 flex items-start">
                <ArrowRight className="w-4 h-4 text-gray-400 mr-2 mt-0.5 flex-shrink-0" />
                <div>
                  <p className="text-[10px] font-bold text-gray-400 uppercase">Berikutnya • {nextAct.time}</p>
                  <p className="text-xs font-bold text-gray-700">{nextAct.desc}</p>
                </div>
              </div>
            )}
          </div>
        );
      };

      const FilterHari = () => (
        <div className="flex gap-2 overflow-x-auto hide-scrollbar py-2 mb-4 sticky top-0 bg-gray-50 z-30 border-b border-gray-200 px-4 -mx-4 shadow-sm">
          <button onClick={() => setSelectedDay(null)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${selectedDay === null ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 border-gray-200 active:bg-gray-100'}`}>Semua</button>
          {[1, 2, 3, 4, 5].map(day => (
            <button key={day} onClick={() => setSelectedDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${selectedDay === day ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 border-gray-200 active:bg-gray-100'}`}>Hari {day}</button>
          ))}
        </div>
      );

      const BottomNav = () => {
        if (currentUser?.role === 'admin') return null; 
        return (
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 pb-safe z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onClick={() => setActiveTab('jadwal')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'jadwal' ? 'text-blue-600' : 'text-gray-400'}`}><Calendar className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Jadwal</span></button>
            <button onClick={() => setActiveTab('peta')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'peta' ? 'text-blue-600' : 'text-gray-400'}`}><MapIcon className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Peta</span></button>
            <button onClick={() => setActiveTab('profil')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'profil' ? 'text-blue-600' : 'text-gray-400'}`}><User className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Profil</span></button>
            <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center p-2 w-16 ${activeTab === 'info' ? 'text-blue-600' : 'text-gray-400'}`}><Info className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Info</span></button>
          </div>
        );
      };

      if (!currentUser) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gray-900 relative">
            <img src="https://image.pollinations.ai/prompt/Kuala%20Lumpur%20skyline%20sunset?width=800&height=600&nologo=true" className="absolute inset-0 w-full h-full object-cover opacity-40" />
            <div className="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10">
              {isDemoMode && <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md whitespace-nowrap">Mode Uji Coba Offline</div>}
              <div className="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><MapPin className="text-white w-7 h-7" /></div>
              <h1 className="text-2xl font-extrabold text-gray-900 mb-1">Trip Planner</h1>
              <p className="text-blue-600 font-bold text-xs uppercase tracking-widest mb-6">Edisi Malaysia</p>
              <form onSubmit={handleLoginSubmit} className="space-y-4">
                <input type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)} className="w-full p-4 border border-gray-200 bg-gray-50 rounded-xl text-base text-center font-bold outline-none focus:border-blue-500" placeholder="Ketik nama Kamu..." required />
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl active:bg-blue-700 shadow-md text-sm">Masuk Eksplorasi</button>
              </form>
              <button onClick={() => setShowAdminModal(true)} className="mt-6 text-xs text-gray-400 font-bold active:text-gray-800 py-2 px-4">Login Admin</button>
            </div>
            {showAdminModal && (
              <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl">
                  <h3 className="text-lg font-extrabold text-gray-900 mb-4">Akses Admin</h3>
                  <input type="password" value={adminPassword} onChange={(e) => setAdminPassword(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl mb-2 text-base outline-none focus:border-blue-500" placeholder="Sandi..." />
                  {adminError && <p className="text-red-500 text-xs mb-4 font-bold">{adminError}</p>}
                  <div className="flex gap-2 justify-end mt-4">
                    <button onClick={() => {setShowAdminModal(false); setAdminError(''); setAdminPassword('');}} className="px-4 py-2.5 text-gray-600 bg-gray-100 rounded-xl font-bold text-sm">Batal</button>
                    <button onClick={handleAdminSubmit} className="px-4 py-2.5 text-white bg-blue-600 rounded-xl font-bold text-sm">Masuk</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      if (currentUser?.role === 'user' && !currentUser?.hasCompletedSurvey) {
        if (surveyStep === 0) {
          return (
            <div className="min-h-screen bg-gray-50 p-4 flex flex-col">
              <header className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">

            </div>
          </div>
          <div className="max-w-md mx-auto w-full">{renderTabContent()}</div>
          <BottomNav />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
